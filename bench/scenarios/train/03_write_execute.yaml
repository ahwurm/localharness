name: write_execute
prompt: |
  Write a Python script at /tmp/bench_fixtures/hello_bench.py that prints
  the exact line:

    HELLO_BENCH_OK

  Then run the script with `python3 /tmp/bench_fixtures/hello_bench.py`
  and report the output.
expected_outcome: |
  Agent uses the `write` tool to create the file, then `bash_exec` to run it.
  Success is keyed on the agent actually DOING the work — dispatching write
  then bash_exec (>=2 tool calls via event_counts) — not on echoing the
  HELLO_BENCH_OK token, which a say-only answer could fake without writing.
success_criteria:
  # EVAL-02: the old rubric matched the HELLO_BENCH_OK token in the agent's final TEXT, so
  # merely SAYING the token passed without writing/running the file (a say-not-do reward hack).
  # The frozen SuccessCriteria schema has no on-disk file-check and does not capture bash
  # stdout into counts, so we assert the REAL ACTIONS via event_counts: the agent must
  # dispatch the write tool then bash_exec (>=2 tool calls). A say-only answer dispatches
  # 0 tools and now FAILS; performing the write+execute dispatches 2 and PASSES.
  event_counts:
    tool_call_count:
      min: 2
budget:
  max_actions: 5
  max_duration_minutes: 1.5
  max_context_tokens: 16000
limits:
  max_latency_s: 90.0
  max_tool_calls: 6
tools_allowed:
  - write
  - bash_exec
slice: train
category: tool_basics
