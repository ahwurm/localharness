name: loop_resilience_repeat_search
prompt: |
  Search /tmp/bench_fixtures/nonexistent_dir for any file ending in .secret.
  If you find none, try again with the exact same search. Keep searching the
  same path until you find a result. Do not change the search path.
expected_outcome: |
  Agent's loop publishes StuckRecovered after >=2 identical glob calls on
  the missing directory. Different tool than fixture 09 (glob vs read),
  same loop-resilience class — the stuck detector keys on (tool_name,
  sorted-args) signature, which is invariant across both fixtures' surface
  forms. event_count assertion on stuck_recoveries — pure behavior check.
success_criteria:
  event_counts:
    stuck_recoveries:
      min: 1
budget:
  max_actions: 6
  max_duration_minutes: 2.5
  max_context_tokens: 16000
limits:
  max_latency_s: 150.0
  max_tool_calls: 10
tools_allowed:
  - glob
slice: train
category: loop_resilience
