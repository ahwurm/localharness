name: agent_orchestration_named_role
prompt: |
  Use the `agent` tool to delegate work to a subagent you name "explorer".
  Ask it to search /tmp/bench_fixtures/exploration_root for the file named
  values.txt under the data/ subdirectory, read it, and report the exact value
  it contains. Return the subagent's findings verbatim in your final response.
expected_outcome: |
  Agent invokes the real Explore subagent via the `agent` tool with a named role.
  The child (read-only {read, glob, grep}) locates data/values.txt, reads its
  MAGIC_VALUE_777 content, and returns a structured "[explore findings]" summary.
  The verdict requires the findings header AND tool_call_count >= 2 (1 parent
  agent-call + >=1 child read/glob), distinct from 06's unnamed delegation —
  exercising the named-role configuration path against a genuine subagent.
success_criteria:
  rubric:
    - "contains:[explore findings]"
  event_counts:
    tool_call_count: { min: 2 }
budget:
  max_actions: 4
  max_duration_minutes: 5.0
  max_context_tokens: 16000
limits:
  max_latency_s: 360.0
  max_tool_calls: 4
tools_allowed:
  - agent
slice: train
category: agent_orchestration
