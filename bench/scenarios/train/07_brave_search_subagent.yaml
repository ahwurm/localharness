name: brave_search_subagent
prompt: |
  Use the `agent` tool to delegate a read-only research task: ask the subagent to
  explore /tmp/bench_fixtures/exploration_root, locate the README.md file, read it,
  and report what the fixture tree is for. Return the subagent's findings verbatim
  in your final response.
expected_outcome: |
  Agent invokes the real Explore subagent via the `agent` tool to research the
  fixture tree (read-only {read, glob, grep}). The child globs/reads README.md (which
  says the tree "holds bench fixture data for 05_file_exploration") and reports what it
  is for; the parent surfaces "fixture data" in its final message. The verdict anchors
  on that ANSWER (not the "[explore findings]" header, which a live model paraphrases
  away) AND tool_call_count >= 2 (1 parent agent-call + >=1 child read/glob). The parent
  has NO read tool, so "fixture data" reaches its final message only THROUGH the
  subagent's findings — answer + floor prove genuine delegation, not a canned plugin-call
  shape (real plugin/MCP execution is fixture 08, out of scope).
success_criteria:
  rubric:
    - "contains:fixture data"
  event_counts:
    tool_call_count: { min: 2 }
budget:
  max_actions: 4
  max_duration_minutes: 5.0
  max_context_tokens: 16000
limits:
  max_latency_s: 360.0
  max_tool_calls: 4
tools_allowed:
  - agent
slice: train
category: agent_orchestration
