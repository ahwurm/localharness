name: agent_creation
prompt: |
  Use the `agent` tool to delegate a read-only exploration: ask the subagent
  to explore /tmp/bench_fixtures/exploration_root, find the file data/values.txt,
  read it, and report the value it holds. Return the subagent's findings verbatim
  in your final response.
expected_outcome: |
  Agent invokes the real Explore subagent (read-only {read, glob, grep}) via the
  `agent` tool. The child explores the fixture tree, reads data/values.txt, and
  reports its value; the parent surfaces MAGIC_VALUE_777 in its final message. The
  verdict anchors on that ANSWER (not the literal "[explore findings]" header, which
  a live model paraphrases away) AND tool_call_count >= 2 (1 parent agent-call + >=1
  child read/glob). Because the parent has NO read tool of its own, MAGIC_VALUE_777
  can only reach its final message THROUGH the subagent's findings — so the answer +
  the count floor together prove genuine end-to-end delegation, not a canned pass.
  (Mirrors 05_file_exploration's MAGIC_VALUE_777 answer-anchor precedent.)
success_criteria:
  rubric:
    - "contains:MAGIC_VALUE_777"
  event_counts:
    tool_call_count: { min: 2 }
budget:
  max_actions: 4
  max_duration_minutes: 5.0
  max_context_tokens: 16000
limits:
  max_latency_s: 360.0
  max_tool_calls: 4
tools_allowed:
  - agent
slice: train
category: agent_orchestration
