name: agent_orchestration_two_step
prompt: |
  Use the `agent` tool TWICE in sequence to delegate two read-only explorations.
  First subagent: explore /tmp/bench_fixtures/exploration_root and read alpha.txt,
  reporting its contents. Second subagent: explore the same root and read
  data/values.txt, reporting the value it holds. After both subagents complete,
  return BOTH sets of findings concatenated in your final response.
expected_outcome: |
  Agent invokes the real Explore subagent (read-only {read, glob, grep}) TWICE in
  sequence. Each child explores the fixture tree, reads its target file, and
  returns a structured "[explore findings]" summary. The verdict requires the
  findings header AND tool_call_count >= 4 (2 parent agent-calls + >=1 child
  read/glob each) — proving sequential delegation, distinct from 06's single step
  and impossible to satisfy with one delegation or a say-not-do.
success_criteria:
  rubric:
    - "contains:[explore findings]"
  event_counts:
    tool_call_count: { min: 4 }
budget:
  max_actions: 6
  max_duration_minutes: 5.0
  max_context_tokens: 16000
limits:
  max_latency_s: 360.0
  max_tool_calls: 6
tools_allowed:
  - agent
slice: train
category: agent_orchestration
