name: agent_orchestration_two_step
prompt: |
  Use the `agent` tool TWICE in sequence to delegate two read-only explorations.
  First subagent: explore /tmp/bench_fixtures/exploration_root and read alpha.txt,
  reporting its contents. Second subagent: explore the same root and read
  data/values.txt, reporting the value it holds. After both subagents complete,
  return BOTH sets of findings concatenated in your final response.
expected_outcome: |
  Agent invokes the real Explore subagent (read-only {read, glob, grep}) TWICE in
  sequence. The first child reads alpha.txt, the second reads data/values.txt; the
  parent surfaces the second child's MAGIC_VALUE_777 in its final message. The verdict
  anchors on that ANSWER (not the "[explore findings]" header, which a live model
  paraphrases away) AND tool_call_count >= 4 (2 parent agent-calls + >=1 child
  read/glob each) — proving SEQUENTIAL delegation: MAGIC_VALUE_777 only reaches the
  parent (which has no read tool) through the 2nd subagent, and the >= 4 floor is
  impossible with one delegation or a say-not-do.
success_criteria:
  rubric:
    - "contains:MAGIC_VALUE_777"
  event_counts:
    tool_call_count: { min: 4 }
budget:
  max_actions: 6
  max_duration_minutes: 5.0
  max_context_tokens: 16000
limits:
  max_latency_s: 360.0
  max_tool_calls: 6
tools_allowed:
  - agent
slice: train
category: agent_orchestration
